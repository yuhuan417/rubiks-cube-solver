<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik's Cube Solver</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #0f3460; }
  .header h1 { font-size: 24px; color: #e94560; }
  .status { font-size: 14px; color: #aaa; }
  .status.ready { color: #4ecca3; }

  /* Color picker */
  .toolbar { background: #16213e; padding: 8px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
  .color-palette { display: flex; gap: 6px; align-items: center; }
  .color-palette span { font-size: 13px; color: #888; }
  .color-btn { width: 32px; height: 32px; border: 3px solid transparent; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .color-btn.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 8px rgba(255,255,255,0.4); }
  .color-btn:hover { transform: scale(1.1); }
  .turn-palette { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .turn-palette span { font-size: 13px; color: #888; }
  .turn-btn { width: 30px; height: 30px; border: 1px solid #0f3460; border-radius: 6px; background: #0d0d1a; color: #eee; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700; transition: all 0.15s; }
  .turn-btn:hover { border-color: #4ecca3; color: #4ecca3; }
  .turn-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
  .mouse-mode { display: flex; gap: 4px; align-items: center; }
  .mouse-mode span { font-size: 13px; color: #888; }
  .mode-btn { height: 30px; padding: 0 10px; border: 1px solid #0f3460; border-radius: 6px; background: transparent; color: #aaa; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .mode-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  .mode-btn:hover { border-color: #4ecca3; color: #4ecca3; }

  /* Main content */
  .main { display: flex; gap: 0; flex: 1; min-height: 0; }
  .panel-2d, .panel-3d { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .panel-2d { background: #1a1a2e; }
  .panel-3d { background: #0d0d1a; border-left: 1px solid #0f3460; }

  /* 2D cube grid */
  .cube-2d { display: grid; gap: 2px; }
  .cell { width: 36px; height: 36px; border-radius: 4px; cursor: pointer; transition: all 0.1s; border: 2px solid rgba(0,0,0,0.3); }
  .cell:hover { transform: scale(1.08); z-index: 1; }
  .cell.preview-paint { transform: scale(1.08); z-index: 2; border-color: #ffffff; box-shadow: 0 0 0 3px rgba(255,255,255,0.45), 0 0 12px rgba(255,255,255,0.55); }
  .cell.preview-turn { transform: scale(1.04); z-index: 1; border-color: #00ffff; box-shadow: inset 0 0 0 999px rgba(0,255,255,0.30), 0 0 10px rgba(0,255,255,0.45); }
  .cell.center { cursor: default; }
  .cell-label { position: absolute; font-size: 10px; color: rgba(255,255,255,0.3); pointer-events: none; }

  /* Face labels */
  .face-label { position: absolute; font-size: 12px; font-weight: bold; color: rgba(255,255,255,0.4); pointer-events: none; }

  /* 3D container */
  #three-container { width: 100%; height: 100%; cursor: grab; }
  #three-container.turn-mode { cursor: pointer; }
  #three-container canvas { display: block; }

  /* Bottom panel */
  .bottom { background: #16213e; padding: 8px 20px; border-top: 2px solid #0f3460; }
  .controls { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .btn-solve { background: #4ecca3; color: #1a1a2e; }
  .btn-solve:hover { background: #3dba94; }
  .btn-solve:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-reset { background: #e94560; color: #fff; }
  .btn-reset:hover { background: #d63851; }
  .btn-play { background: #533483; color: #fff; }
  .btn-play:hover { background: #6b44a0; }
  .btn-play:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-undo { background: #555; color: #fff; }
  .btn-undo:hover { background: #666; }
  .solver-mode { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #aaa; }
  .solver-select { height: 34px; padding: 6px 10px; border: 1px solid #0f3460; border-radius: 6px; background: #0d0d1a; color: #eee; outline: none; }
  .solver-select:focus { border-color: #4ecca3; box-shadow: 0 0 0 2px rgba(78,204,163,0.18); }

  .state-editor { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .state-editor label { font-size: 13px; color: #aaa; white-space: nowrap; }
  .state-input { flex: 1; min-width: 280px; height: 34px; padding: 6px 10px; border: 1px solid #0f3460; border-radius: 6px; background: #0d0d1a; color: #eee; font-family: 'Courier New', monospace; font-size: 13px; text-transform: uppercase; outline: none; }
  .state-input.current { color: #888; }
  .state-input:focus { border-color: #4ecca3; box-shadow: 0 0 0 2px rgba(78,204,163,0.18); }
  .state-input-status { min-width: 120px; font-size: 12px; color: #888; }

  .solution-info { display: flex; align-items: center; gap: 16px; }
  .solution-text { font-family: 'Courier New', monospace; font-size: 15px; color: #4ecca3; word-break: break-all; flex: 1; }
  .solution-text.has-moves { display: flex; align-items: center; flex-wrap: wrap; gap: 4px 6px; line-height: 1.7; max-height: 58px; overflow-y: auto; padding: 1px 0; scrollbar-width: thin; }
  .solution-move { padding: 1px 5px; border-radius: 4px; color: #7a8f89; background: rgba(255,255,255,0.04); }
  .solution-move.done { color: #4ecca3; background: rgba(78,204,163,0.10); }
  .solution-move.active { color: #111827; background: #ffd500; box-shadow: 0 0 0 1px rgba(255,255,255,0.45), 0 0 12px rgba(255,213,0,0.35); }
  .solution-count { font-size: 13px; color: #888; white-space: nowrap; }
  .step-indicator { font-size: 13px; color: #e94560; }

  /* Instructions */
  .instructions { font-size: 12px; color: #666; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>🧊 Rubik's Cube Solver</h1>
  <div class="status" id="solverStatus">初始化求解器中...</div>
</div>

<div class="toolbar">
  <div class="color-palette">
    <span>选择颜色:</span>
    <div class="color-btn" data-face="U" style="background:#ffff00" title="黄色 (顶面)"></div>
    <div class="color-btn active" data-face="D" style="background:#ffffff" title="白色 (底面)"></div>
    <div class="color-btn" data-face="R" style="background:#ff0000" title="红色 (右)"></div>
    <div class="color-btn" data-face="L" style="background:#ff8000" title="橙色 (左)"></div>
    <div class="color-btn" data-face="F" style="background:#0000ff" title="蓝色 (前)"></div>
    <div class="color-btn" data-face="B" style="background:#00ff00" title="绿色 (后)"></div>
  </div>
  <div class="turn-palette">
    <span>转动:</span>
    <button class="turn-btn" data-turn="U" title="U">U</button>
    <button class="turn-btn" data-turn="U'" title="U'">U'</button>
    <button class="turn-btn" data-turn="R" title="R">R</button>
    <button class="turn-btn" data-turn="R'" title="R'">R'</button>
    <button class="turn-btn" data-turn="F" title="F">F</button>
    <button class="turn-btn" data-turn="F'" title="F'">F'</button>
    <button class="turn-btn" data-turn="D" title="D">D</button>
    <button class="turn-btn" data-turn="D'" title="D'">D'</button>
    <button class="turn-btn" data-turn="L" title="L">L</button>
    <button class="turn-btn" data-turn="L'" title="L'">L'</button>
    <button class="turn-btn" data-turn="B" title="B">B</button>
    <button class="turn-btn" data-turn="B'" title="B'">B'</button>
  </div>
  <div class="mouse-mode">
    <span>鼠标:</span>
    <button class="mode-btn active" data-mouse-mode="mark" title="拖拽3D换视角，点击贴纸标色">视角/标色</button>
    <button class="mode-btn" data-mouse-mode="turn" title="左键点击贴纸转对应面，右键逆时针，拖拽任意区域换视角，Shift反向">转动</button>
  </div>
</div>

<div class="main">
  <div class="panel-2d" id="panel2d">
    <div class="cube-2d" id="cube2d"></div>
  </div>
  <div class="panel-3d" id="panel3d">
    <div id="three-container"></div>
  </div>
</div>

<div class="bottom">
  <div class="controls">
    <button class="btn btn-solve" id="btnSolve" disabled>求解</button>
    <label class="solver-mode" for="solverMode">算法
      <select class="solver-select" id="solverMode">
        <option value="lbl" selected>固定公式 LBL</option>
        <option value="twoPhase">两阶段</option>
      </select>
    </label>
    <span id="validityStatus" style="font-size:13px; padding:4px 12px; border-radius:4px;"></span>
    <button class="btn btn-undo" id="btnUndo" disabled>撤销</button>
    <button class="btn btn-undo" id="btnRedo" disabled>重做</button>
    <button class="btn btn-reset" id="btnReset">重置</button>
    <button class="btn btn-undo" id="btnInitial">回到初始</button>
    <button class="btn btn-play" id="btnPlay" disabled>▶ 播放动画</button>
    <button class="btn btn-play" id="btnStepPrev" disabled>◀ 上一步</button>
    <button class="btn btn-play" id="btnStepNext" disabled>下一步 ▶</button>
  </div>
  <div class="state-editor">
    <label for="stateInput">初始状态串</label>
    <input class="state-input" id="stateInput" spellcheck="false" autocomplete="off"
      placeholder="UUUUUUUUURRRRRRRRRFFFFFFFFFDDDDDDDDDLLLLLLLLLBBBBBBBBB">
    <button class="btn btn-undo" id="btnApplyState">应用</button>
    <button class="btn btn-undo" id="btnSetInitial">设当前为初始</button>
    <span class="state-input-status" id="stateInputStatus"></span>
  </div>
  <div class="state-editor">
    <label for="currentStateInput">当前状态串</label>
    <input class="state-input current" id="currentStateInput" spellcheck="false" readonly>
  </div>
  <div class="solution-info">
    <span class="solution-count" id="solutionCount"></span>
    <span class="solution-text" id="solutionText">标记魔方颜色后点击"求解"</span>
    <span class="step-indicator" id="stepIndicator"></span>
  </div>
  <div class="instructions">点击色块切换颜色 | 中心块颜色固定 | 键盘 U/R/F/D/L/B 转动，Shift 反向 | 鼠标“视角/标色”可拖拽换视角、点击标色，“转动”左键点贴纸转层、右键逆时针、拖拽任意区域换视角 | 状态串顺序为 U R F D L B</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="cubejs-combined.js"></script>
<script>
// ============================================================
// Constants
// ============================================================
const FACE_COLORS = {
  U: '#ffff00', D: '#ffffff', R: '#ff0000',
  L: '#ff8000', F: '#0000ff', B: '#00ff00'
};
const FACE_NAMES = ['U', 'R', 'F', 'D', 'L', 'B'];
const FACE_LABELS = { U: '上', R: '右', F: '前', D: '下', L: '左', B: '后' };
const SOLVED_STATE = 'UUUUUUUUURRRRRRRRRFFFFFFFFFDDDDDDDDDLLLLLLLLLBBBBBBBBB';

// Grid layout: 12 columns, 9 rows
// Each face occupies 3x3 cells at (col, row) offset
const FACE_GRID = {
  U: [3, 0], R: [6, 3], F: [3, 3], D: [3, 6], L: [0, 3], B: [9, 3]
};

// Cubejs facelet order: U(0-8), R(9-17), F(18-26), D(27-35), L(36-44), B(45-53)
const CORNER_FACELETS = [
  [8, 9, 20], [6, 18, 38], [0, 36, 47], [2, 45, 11],
  [29, 26, 15], [27, 44, 24], [33, 53, 42], [35, 17, 51]
];
const CORNER_COLORS = [
  ['U', 'R', 'F'], ['U', 'F', 'L'], ['U', 'L', 'B'], ['U', 'B', 'R'],
  ['D', 'F', 'R'], ['D', 'L', 'F'], ['D', 'B', 'L'], ['D', 'R', 'B']
];
const EDGE_FACELETS = [
  [5, 10], [7, 19], [3, 37], [1, 46],
  [32, 16], [28, 25], [30, 43], [34, 52],
  [23, 12], [21, 41], [50, 39], [48, 14]
];
const EDGE_COLORS = [
  ['U', 'R'], ['U', 'F'], ['U', 'L'], ['U', 'B'],
  ['D', 'R'], ['D', 'F'], ['D', 'L'], ['D', 'B'],
  ['F', 'R'], ['F', 'L'], ['B', 'L'], ['B', 'R']
];
const TURN_ANIMATION_MS = 450;
const TURN_DRAG_THRESHOLD = 8;
const PREVIEW_TURN_COLOR = '#00ffff';
const PREVIEW_PAINT_MIX = 0.55;
const PREVIEW_TURN_MIX = 0.35;
const CUBE_PICK_HALF_EXTENT = 1.45;
const CUBE_PICK_PLANE_OFFSET = 1.5;
const TURN_SPECS = {
  U: { axis: 'y', key: 'gy', layer: 1, direction: -1 },
  D: { axis: 'y', key: 'gy', layer: -1, direction: 1 },
  R: { axis: 'x', key: 'gx', layer: 1, direction: -1 },
  L: { axis: 'x', key: 'gx', layer: -1, direction: 1 },
  F: { axis: 'z', key: 'gz', layer: 1, direction: -1 },
  B: { axis: 'z', key: 'gz', layer: -1, direction: 1 }
};

// ============================================================
// State
// ============================================================
let cubeState = new Array(54).fill(0).map((_, i) => FACE_NAMES[Math.floor(i / 9)]);
let initialCubeState = [...cubeState];
let selectedFace = 'D';
let mouseMode = 'mark';
let solverReady = false;
let twoPhaseReady = false;
let solution = [];
let solutionSteps = [];
let currentStep = -1;
let isPlaying = false;
let playTimer = null;
let undoStack = [];
let redoStack = [];

// 3D state
let scene, camera, renderer, controls;
let smallCubes = [];
let raycaster, mouse;
let isAnimating3D = false;
let turnPointer = null;
let hoverPreview = null;

// ============================================================
// Initialization
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  init2DView();
  init3DView();
  initEventListeners();
  initSolver();
});

// ============================================================
// Solver Initialization (async with progress)
// ============================================================
function initSolver() {
  const statusEl = document.getElementById('solverStatus');
  if (typeof Cube === 'undefined') {
    solverReady = false;
    statusEl.textContent = '✗ cubejs 库加载失败';
    checkValidity();
    return;
  }

  solverReady = true;
  statusEl.textContent = '✓ 固定公式 LBL 就绪；两阶段初始化中...';
  statusEl.className = 'status ready';
  checkValidity();

  // Two-phase initialization is optional; LBL does not depend on it.
  setTimeout(() => {
    try {
      Cube.initSolver();
      twoPhaseReady = true;
      statusEl.textContent = '✓ 求解器就绪';
      statusEl.className = 'status ready';
      checkValidity();
    } catch (e) {
      statusEl.textContent = '✗ 求解器初始化失败: ' + e.message;
      console.error(e);
    }
  }, 100);
}

// ============================================================
// Event Listeners
// ============================================================
function initEventListeners() {
  // Color palette
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.style.background = FACE_COLORS[btn.dataset.face];
    btn.addEventListener('click', () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFace = btn.dataset.face;
      if (hoverPreview?.type === 'paint') updatePreviewViews();
    });
  });

  document.querySelectorAll('.turn-btn').forEach(btn => {
    btn.addEventListener('click', () => turnCubeState(btn.dataset.turn));
  });

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mouseMode = btn.dataset.mouseMode;
      turnPointer = null;
      clearPreview();
      document.getElementById('three-container').classList.toggle('turn-mode', mouseMode === 'turn');
    });
  });

  // Buttons
  document.getElementById('btnSolve').addEventListener('click', solveCube);
  document.getElementById('btnReset').addEventListener('click', resetCube);
  document.getElementById('btnInitial').addEventListener('click', restoreInitialState);
  document.getElementById('btnUndo').addEventListener('click', undoAction);
  document.getElementById('btnRedo').addEventListener('click', redoAction);
  document.getElementById('btnPlay').addEventListener('click', togglePlay);
  document.getElementById('btnStepPrev').addEventListener('click', () => stepTo(currentStep - 1));
  document.getElementById('btnStepNext').addEventListener('click', () => stepTo(currentStep + 1));
  document.getElementById('btnApplyState').addEventListener('click', applyStateInput);
  document.getElementById('btnSetInitial').addEventListener('click', setCurrentAsInitial);
  document.getElementById('solverMode').addEventListener('change', checkValidity);
  document.getElementById('stateInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') applyStateInput();
  });
  document.addEventListener('keydown', onTurnKeyDown);

  syncStateInput();
  syncCurrentStateInput();
  updateHistoryButtons();
}

function recordHistory(beforeState, afterState, meta = {}) {
  const entry = typeof meta === 'string' ? { label: meta } : (meta || {});
  if (beforeState.join('') === afterState.join('')) return;
  undoStack.push({
    before: [...beforeState],
    after: [...afterState],
    label: entry.label || '',
    kind: entry.kind || '',
    move: entry.move || ''
  });
  redoStack = [];
  updateHistoryButtons();
}

// ============================================================
// 2D View
// ============================================================
function init2DView() {
  const container = document.getElementById('cube2d');
  container.style.gridTemplateColumns = `repeat(12, 36px)`;
  container.style.gridTemplateRows = `repeat(9, 36px)`;
  container.style.position = 'relative';

  // Create 12x9 grid
  for (let row = 0; row < 9; row++) {
    for (let col = 0; col < 12; col++) {
      const face = getFaceForGrid(col, row);
      if (!face) {
        const spacer = document.createElement('div');
        container.appendChild(spacer);
        continue;
      }
      const localCol = col - FACE_GRID[face][0];
      const localRow = row - FACE_GRID[face][1];
      const idx = FACE_NAMES.indexOf(face) * 9 + localRow * 3 + localCol;
      const isCenter = (localRow === 1 && localCol === 1);

      const cell = document.createElement('div');
      cell.className = 'cell' + (isCenter ? ' center' : '');
      cell.style.background = FACE_COLORS[cubeState[idx]];
      cell.dataset.idx = idx;
      cell.title = `${FACE_LABELS[face]} (${localRow},${localCol})`;

      if (!isCenter) {
        cell.addEventListener('click', () => onCellClick(idx, cell));
        cell.addEventListener('mouseenter', () => {
          if (mouseMode === 'mark') setPaintPreview(idx);
          else setTurnPreview(face);
        });
        cell.addEventListener('mouseleave', clearPreview);
      } else {
        cell.addEventListener('mouseenter', () => {
          if (mouseMode === 'turn') setTurnPreview(face);
        });
        cell.addEventListener('mouseleave', clearPreview);
      }

      container.appendChild(cell);
    }
  }

  // Add face labels
  Object.entries(FACE_GRID).forEach(([face, [col, row]]) => {
    const label = document.createElement('div');
    label.className = 'face-label';
    label.textContent = FACE_LABELS[face];
    label.style.left = (col * 38 + 42) + 'px';
    label.style.top = (row * 38 + 40) + 'px';
    container.appendChild(label);
  });
}

function getFaceForGrid(col, row) {
  for (const [face, [fc, fr]] of Object.entries(FACE_GRID)) {
    if (col >= fc && col < fc + 3 && row >= fr && row < fr + 3) return face;
  }
  return null;
}

function mixColors(baseHex, overlayHex, ratio) {
  const base = new THREE.Color(baseHex);
  const overlay = new THREE.Color(overlayHex);
  const mixed = base.clone().lerp(overlay, ratio);
  return `#${mixed.getHexString()}`;
}

function setPaintPreview(idx) {
  if (isAnimating3D) return;
  const localIdx = idx % 9;
  if (localIdx === 4) {
    clearPreview();
    return;
  }
  if (isSamePreview({ type: 'paint', idx })) return;
  hoverPreview = { type: 'paint', idx };
  updatePreviewViews();
}

function setTurnPreview(face) {
  if (isAnimating3D || !TURN_SPECS[face]) return;
  if (isSamePreview({ type: 'turn', face })) return;
  hoverPreview = { type: 'turn', face };
  updatePreviewViews();
}

function clearPreview() {
  if (!hoverPreview) return;
  hoverPreview = null;
  updatePreviewViews();
}

function updatePreviewViews() {
  update2DPreview();
  update3DCube();
}

function isSamePreview(next) {
  if (!hoverPreview || hoverPreview.type !== next.type) return false;
  if (next.type === 'paint') return hoverPreview.idx === next.idx;
  if (next.type === 'turn') return hoverPreview.face === next.face;
  return false;
}

function update2DPreview() {
  const cells = document.querySelectorAll('.cell');
  const turnIndices = hoverPreview?.type === 'turn'
    ? getTurnPreviewIndices(hoverPreview.face)
    : null;

  cells.forEach(cell => {
    const idx = parseInt(cell.dataset.idx);
    cell.classList.remove('preview-paint', 'preview-turn');
    if (hoverPreview?.type === 'paint' && idx === hoverPreview.idx) {
      cell.classList.add('preview-paint');
      cell.style.background = mixColors(FACE_COLORS[cubeState[idx]], FACE_COLORS[selectedFace], PREVIEW_PAINT_MIX);
    } else {
      cell.style.background = FACE_COLORS[cubeState[idx]];
    }
    if (turnIndices && turnIndices.has(idx)) {
      cell.classList.add('preview-turn');
    }
  });
}

function getTurnPreviewIndices(face) {
  const spec = TURN_SPECS[face];
  const indices = new Set();
  if (!spec) return indices;

  for (let idx = 0; idx < 54; idx++) {
    const sticker = getFaceletCoords(idx);
    if (sticker[spec.key] === spec.layer) indices.add(idx);
  }
  return indices;
}

function onCellClick(idx, cell) {
  if (cubeState[idx] === selectedFace) return;

  const beforeState = [...cubeState];
  clearPreview();
  cubeState[idx] = selectedFace;
  initialCubeState = [...cubeState];
  recordHistory(beforeState, cubeState, { label: '标色', kind: 'paint' });
  cell.style.background = FACE_COLORS[selectedFace];
  clearSolution();
  update3DCube();
  syncStateInput();
  syncCurrentStateInput();
  checkValidity();
}

function onTurnKeyDown(event) {
  const target = event.target;
  if (target && ['INPUT', 'TEXTAREA', 'SELECT', 'BUTTON'].includes(target.tagName)) return;
  if ((event.ctrlKey || event.metaKey) && !event.altKey) {
    const key = event.key.toLowerCase();
    if (key === 'z') {
      event.preventDefault();
      if (event.shiftKey) redoAction();
      else undoAction();
    } else if (key === 'y') {
      event.preventDefault();
      redoAction();
    }
    return;
  }
  if (event.ctrlKey || event.metaKey || event.altKey) return;

  const face = event.key.toUpperCase();
  if (!FACE_NAMES.includes(face)) return;

  event.preventDefault();
  turnCubeState(face + (event.shiftKey ? "'" : ''));
}

async function turnCubeState(move) {
  if (!move || typeof Cube === 'undefined' || isAnimating3D) return;
  if (!/^[URFDLB](2|')?$/.test(move)) return;

  try {
    const nextState = rotateFaceletState(cubeState, move);
    const beforeState = [...cubeState];
    clearSolution();
    await animateTurn3D(parseSolution([move])[0]);
    cubeState = nextState;
    initialCubeState = [...cubeState];
    recordHistory(beforeState, cubeState, { label: `转动 ${move}`, kind: 'turn', move });
    update2DView();
    update3DCube();
    if (hoverPreview) updatePreviewViews();
    syncStateInput(`已转动 ${move}`);
    syncCurrentStateInput();
    checkValidity();
  } catch (e) {
    document.getElementById('stateInputStatus').textContent = '当前状态无法转动';
    document.getElementById('stateInputStatus').style.color = '#e94560';
    console.error(e);
  }
}

function rotateFaceletState(state, move) {
  const parsed = parseSolution([move])[0];
  const spec = TURN_SPECS[parsed.face];
  if (!spec) return [...state];

  const direction = spec.direction;
  const nextState = [...state];

  for (let idx = 0; idx < 54; idx++) {
    const sticker = getFaceletCoords(idx);
    if (sticker[spec.key] !== spec.layer) continue;

    let point = { gx: sticker.gx, gy: sticker.gy, gz: sticker.gz };
    let normal = { gx: sticker.nx, gy: sticker.ny, gz: sticker.nz };
    for (let i = 0; i < parsed.times; i++) {
      point = rotateGridPoint(point.gx, point.gy, point.gz, spec.axis, direction);
      normal = rotateGridPoint(normal.gx, normal.gy, normal.gz, spec.axis, direction);
    }

    const face = getFaceFromNormal(normal);
    const nextIdx = getFaceletIndex(face, point.gx, point.gy, point.gz);
    nextState[nextIdx] = state[idx];
  }

  return nextState;
}

function getFaceletCoords(index) {
  if (!window._faceletCoords) {
    const normalByFace = {
      U: { nx: 0, ny: 1, nz: 0 },
      D: { nx: 0, ny: -1, nz: 0 },
      R: { nx: 1, ny: 0, nz: 0 },
      L: { nx: -1, ny: 0, nz: 0 },
      F: { nx: 0, ny: 0, nz: 1 },
      B: { nx: 0, ny: 0, nz: -1 }
    };
    window._faceletCoords = new Array(54);

    for (const face of FACE_NAMES) {
      for (let gx = -1; gx <= 1; gx++) {
        for (let gy = -1; gy <= 1; gy++) {
          for (let gz = -1; gz <= 1; gz++) {
            if ((face === 'U' && gy !== 1) || (face === 'D' && gy !== -1)
              || (face === 'R' && gx !== 1) || (face === 'L' && gx !== -1)
              || (face === 'F' && gz !== 1) || (face === 'B' && gz !== -1)) {
              continue;
            }
            const idx = getFaceletIndex(face, gx, gy, gz);
            window._faceletCoords[idx] = { face, gx, gy, gz, ...normalByFace[face] };
          }
        }
      }
    }
  }

  return window._faceletCoords[index];
}

function getFaceFromNormal(normal) {
  if (normal.gy === 1) return 'U';
  if (normal.gy === -1) return 'D';
  if (normal.gx === 1) return 'R';
  if (normal.gx === -1) return 'L';
  if (normal.gz === 1) return 'F';
  return 'B';
}

// ============================================================
// 3D View
// ============================================================
function init3DView() {
  const container = document.getElementById('three-container');
  // Use default size if container is hidden
  const w = container.clientWidth || 600;
  const h = container.clientHeight || 500;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0d1a);

  camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(5, 4, 5);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Simple orbit controls (manual implementation)
  initOrbitControls(container);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  // Raycaster for picking
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // Build cube
  build3DCube();

  // Mouse handlers for 3D picking and turning
  container.addEventListener('mousedown', on3DTurnPointerDown);
  container.addEventListener('mousemove', on3DTurnPointerMove);
  container.addEventListener('mouseup', on3DTurnPointerUp);
  container.addEventListener('contextmenu', (e) => {
    if (mouseMode === 'turn') e.preventDefault();
  });
  container.addEventListener('mouseleave', () => {
    clearPreview();
    clearTurnPointer();
    if (controls) controls.endOrbitDrag();
  });
  container.addEventListener('mousemove', update3DHoverPreview);
  container.addEventListener('click', on3DClick);

  // Resize handler
  window.addEventListener('resize', () => {
    const w2 = container.clientWidth;
    const h2 = container.clientHeight;
    camera.aspect = w2 / h2;
    camera.updateProjectionMatrix();
    renderer.setSize(w2, h2);
  });

  animate3D();
}

function build3DCube() {
  // Clear old cubes
  smallCubes.forEach(c => scene.remove(c));
  smallCubes = [];

  const size = 0.9;
  const gap = 1.0;

  for (let x = -1; x <= 1; x++) {
    for (let y = -1; y <= 1; y++) {
      for (let z = -1; z <= 1; z++) {
        const geometry = new THREE.BoxGeometry(size, size, size);
        const materials = getCubeMaterials(x, y, z);
        const mesh = new THREE.Mesh(geometry, materials);
        mesh.position.set(x * gap, y * gap, z * gap);

        // Add black edges
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
        mesh.add(line);

        // Store grid position for picking
        mesh.userData = { gx: x, gy: y, gz: z };
        scene.add(mesh);
        smallCubes.push(mesh);
      }
    }
  }
}

function getCubeMaterials(x, y, z) {
  // Three.js BoxGeometry face order: 0=+x, 1=-x, 2=+y, 3=-y, 4=+z, 5=-z
  const materials = [];
  const sides = [
    { face: 'R', onFace: x === 1 },
    { face: 'L', onFace: x === -1 },
    { face: 'U', onFace: y === 1 },
    { face: 'D', onFace: y === -1 },
    { face: 'F', onFace: z === 1 },
    { face: 'B', onFace: z === -1 },
  ];
  for (const { face, onFace } of sides) {
    if (onFace) {
      const idx = getFaceletIndex(face, x, y, z);
      const baseColor = FACE_COLORS[cubeState[idx]];
      const previewColor = get3DPreviewColor(idx, baseColor);
      materials.push(new THREE.MeshBasicMaterial({ color: previewColor }));
    } else {
      materials.push(new THREE.MeshBasicMaterial({ color: 0x111111 }));
    }
  }
  return materials;
}

function get3DPreviewColor(idx, baseColor) {
  if (!hoverPreview) return baseColor;
  if (hoverPreview.type === 'paint' && idx === hoverPreview.idx) {
    return mixColors(baseColor, FACE_COLORS[selectedFace], PREVIEW_PAINT_MIX);
  }
  if (hoverPreview.type === 'turn') {
    const spec = TURN_SPECS[hoverPreview.face];
    if (!spec) return baseColor;
    const sticker = getFaceletCoords(idx);
    if (sticker[spec.key] === spec.layer) {
      return mixColors(baseColor, PREVIEW_TURN_COLOR, PREVIEW_TURN_MIX);
    }
  }
  return baseColor;
}

function getFaceletIndex(face, x, y, z) {
  // Map 3D grid position (x,y,z in [-1,0,1]) to cubejs facelet index (0-53)
  // Cubejs facelet order: U(0-8), R(9-17), F(18-26), D(27-35), L(36-44), B(45-53)
  // Each face read left-to-right, top-to-bottom when viewed from outside
  let row, col;
  switch (face) {
    case 'U': row = z + 1; col = x + 1; break;     // Top: row0=z-1, row2=z+1
    case 'D': row = 1 - z; col = x + 1; break;     // Bottom: row0=z+1, row2=z-1
    case 'F': row = 1 - y; col = x + 1; break;     // Front: row0=y+1, col0=x-1
    case 'B': row = 1 - y; col = 1 - x; break;     // Back: mirrored x (looking from behind)
    case 'R': row = 1 - y; col = 1 - z; break;     // Right: col0=z+1, col2=z-1
    case 'L': row = 1 - y; col = z + 1; break;     // Left: col0=z-1, col2=z+1
  }
  return FACE_NAMES.indexOf(face) * 9 + row * 3 + col;
}

function on3DClick(event) {
  if (isAnimating3D) return;
  if (mouseMode === 'turn') return;
  if (controls && controls.wasDrag()) return; // Don't pick if user was orbiting

  const hit = pick3DFacelet(event);
  if (hit) {
    const { cubeIdx } = hit;

    // Don't allow changing center pieces (index 4 within each face)
    const localIdx = cubeIdx % 9;
    if (localIdx === 4) return; // Center piece
    if (cubeState[cubeIdx] === selectedFace) return;

    const beforeState = [...cubeState];
    clearPreview();
    cubeState[cubeIdx] = selectedFace;
    initialCubeState = [...cubeState];
    recordHistory(beforeState, cubeState, { label: '标色', kind: 'paint' });
    clearSolution();

    // Update both views
    update3DCube();
    update2DView();
    syncStateInput();
    syncCurrentStateInput();
    checkValidity();
  }
}

function update3DHoverPreview(event) {
  if (isAnimating3D || turnPointer) return;

  if (mouseMode === 'turn') {
    const hit = pick3DTurnFace(event);
    if (hit) setTurnPreview(hit.face);
    else clearPreview();
    return;
  }

  if (mouseMode === 'mark') {
    const hit = pick3DFacelet(event);
    if (!hit) {
      clearPreview();
      return;
    }
    setPaintPreview(hit.cubeIdx);
  }
}

function on3DTurnPointerDown(event) {
  if (mouseMode !== 'turn' || isAnimating3D) return;
  if (event.button !== 0 && event.button !== 2) return;

  event.preventDefault();
  turnPointer = {
    hit: pick3DTurnFace(event),
    x: event.clientX,
    y: event.clientY,
    reverse: event.button === 2 || event.shiftKey,
    dragging: false,
    downTarget: event.target
  };
  if (controls) controls.beginOrbitDrag(event);
}

function on3DTurnPointerMove(event) {
  if (mouseMode !== 'turn' || !turnPointer || isAnimating3D) return;
  const dx = event.clientX - turnPointer.x;
  const dy = event.clientY - turnPointer.y;
  if (Math.hypot(dx, dy) > TURN_DRAG_THRESHOLD) {
    turnPointer.dragging = true;
    clearPreview();
  }
  if (controls) controls.moveOrbitDrag(event);
}

function on3DTurnPointerUp(event) {
  if (mouseMode !== 'turn' || !turnPointer || isAnimating3D) {
    clearTurnPointer();
    return;
  }

  event.preventDefault();
  if (controls) controls.endOrbitDrag();

  const dx = event.clientX - turnPointer.x;
  const dy = event.clientY - turnPointer.y;
  const moved = turnPointer.dragging || Math.hypot(dx, dy) > TURN_DRAG_THRESHOLD;
  const move = !moved && turnPointer.hit
    ? getMoveFrom3DGesture(turnPointer.hit, dx, dy, event.shiftKey || turnPointer.reverse)
    : null;
  clearTurnPointer();
  if (move) turnCubeState(move);
}

function clearTurnPointer() {
  turnPointer = null;
}

function pick3DFacelet(event) {
  const container = document.getElementById('three-container');
  const rect = container.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(smallCubes);
  if (intersects.length === 0) return null;

  const intersect = intersects[0];
  const mesh = intersect.object;
  const faceIndex = Math.floor(intersect.faceIndex / 2); // Each face = 2 triangles
  const faces = ['R', 'L', 'U', 'D', 'F', 'B'];
  const face = faces[faceIndex];
  const { gx, gy, gz } = mesh.userData;
  return {
    face,
    gx,
    gy,
    gz,
    cubeIdx: getFaceletIndex(face, gx, gy, gz)
  };
}

function pick3DTurnFace(event) {
  const container = document.getElementById('three-container');
  const rect = container.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const origin = raycaster.ray.origin;
  const direction = raycaster.ray.direction;
  const candidates = [
    { face: 'R', axis: 'x', value: CUBE_PICK_PLANE_OFFSET },
    { face: 'L', axis: 'x', value: -CUBE_PICK_PLANE_OFFSET },
    { face: 'U', axis: 'y', value: CUBE_PICK_PLANE_OFFSET },
    { face: 'D', axis: 'y', value: -CUBE_PICK_PLANE_OFFSET },
    { face: 'F', axis: 'z', value: CUBE_PICK_PLANE_OFFSET },
    { face: 'B', axis: 'z', value: -CUBE_PICK_PLANE_OFFSET }
  ];

  let best = null;
  for (const candidate of candidates) {
    const dirComponent = direction[candidate.axis];
    if (Math.abs(dirComponent) < 1e-6) continue;

    const t = (candidate.value - origin[candidate.axis]) / dirComponent;
    if (t <= 0) continue;

    const point = origin.clone().add(direction.clone().multiplyScalar(t));
    if (!isPointOnCubeFace(candidate.axis, point)) continue;
    if (!best || t < best.t) {
      best = { face: candidate.face, t };
    }
  }

  return best ? { face: best.face } : null;
}

function isPointOnCubeFace(axis, point) {
  const limit = CUBE_PICK_HALF_EXTENT;
  if (axis !== 'x' && Math.abs(point.x) > limit) return false;
  if (axis !== 'y' && Math.abs(point.y) > limit) return false;
  if (axis !== 'z' && Math.abs(point.z) > limit) return false;
  return true;
}

function getMoveFrom3DGesture(hit, dx, dy, reverse) {
  const dragDistance = Math.hypot(dx, dy);
  let move;

  if (dragDistance < TURN_DRAG_THRESHOLD) {
    move = hit.face;
  } else {
    const horizontal = Math.abs(dx) >= Math.abs(dy);
    if (hit.face === 'F' || hit.face === 'B') {
      move = horizontal ? (dy >= 0 ? 'D' : 'U') : (dx >= 0 ? 'R' : 'L');
    } else if (hit.face === 'R' || hit.face === 'L') {
      move = horizontal ? (dy >= 0 ? 'D' : 'U') : (dx >= 0 ? 'B' : 'F');
    } else {
      move = horizontal ? (dy >= 0 ? 'F' : 'B') : (dx >= 0 ? 'R' : 'L');
    }
  }

  return reverse ? move + "'" : move;
}

function update3DCube() {
  smallCubes.forEach(mesh => {
    const { gx, gy, gz } = mesh.userData;
    const materials = getCubeMaterials(gx, gy, gz);
    mesh.material = materials;
    mesh.position.set(gx, gy, gz);
    mesh.rotation.set(0, 0, 0);
  });
}

function animateTurn3D(move, reverse = false) {
  if (!scene || !smallCubes.length) return Promise.resolve();

  const spec = TURN_SPECS[move.face];
  if (!spec) return Promise.resolve();

  const visualTurn = getVisualTurn(move, reverse);
  const direction = spec.direction * visualTurn.sign;
  const angle = (Math.PI / 2) * direction * visualTurn.quarterTurns;
  const layerMeshes = smallCubes.filter(mesh => mesh.userData[spec.key] === spec.layer);
  if (layerMeshes.length === 0) return Promise.resolve();

  isAnimating3D = true;

  const group = new THREE.Group();
  scene.add(group);
  layerMeshes.forEach(mesh => {
    group.attach(mesh);
  });

  const startTime = performance.now();

  return new Promise(resolve => {
    function frame(now) {
      const progress = Math.min((now - startTime) / TURN_ANIMATION_MS, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      group.rotation[spec.axis] = angle * eased;

      if (progress < 1) {
        requestAnimationFrame(frame);
        return;
      }

      group.rotation[spec.axis] = angle;
      group.updateMatrixWorld(true);
      layerMeshes.forEach(mesh => {
        scene.attach(mesh);
        rotateMeshGridPosition(mesh, spec.axis, direction, visualTurn.quarterTurns);
      });
      scene.remove(group);
      isAnimating3D = false;
      resolve();
    }

    requestAnimationFrame(frame);
  });
}

function getVisualTurn(move, reverse = false) {
  let power = move.times;
  if (reverse) power = (4 - power) % 4;

  if (power === 3) {
    return { quarterTurns: 1, sign: -1 };
  }
  if (power === 2) {
    return { quarterTurns: 2, sign: 1 };
  }
  return { quarterTurns: 1, sign: 1 };
}

function rotateMeshGridPosition(mesh, axis, direction, times) {
  let { gx, gy, gz } = mesh.userData;
  const turns = ((times % 4) + 4) % 4;

  for (let i = 0; i < turns; i++) {
    const next = rotateGridPoint(gx, gy, gz, axis, direction);
    gx = next.gx;
    gy = next.gy;
    gz = next.gz;
  }

  mesh.userData.gx = gx;
  mesh.userData.gy = gy;
  mesh.userData.gz = gz;
}

function rotateGridPoint(gx, gy, gz, axis, direction) {
  if (axis === 'x') {
    return direction === 1
      ? { gx, gy: -gz, gz: gy }
      : { gx, gy: gz, gz: -gy };
  }
  if (axis === 'y') {
    return direction === 1
      ? { gx: gz, gy, gz: -gx }
      : { gx: -gz, gy, gz: gx };
  }
  return direction === 1
    ? { gx: -gy, gy: gx, gz }
    : { gx: gy, gy: -gx, gz };
}

function update2DView() {
  const cells = document.querySelectorAll('.cell');
  cells.forEach(cell => {
    const idx = parseInt(cell.dataset.idx);
    cell.classList.remove('preview-paint', 'preview-turn');
    cell.style.background = FACE_COLORS[cubeState[idx]];
  });
  if (hoverPreview) update2DPreview();
}

function syncStateInput(message = '') {
  const input = document.getElementById('stateInput');
  const status = document.getElementById('stateInputStatus');
  if (!input || !status) return;

  input.value = initialCubeState.join('');
  status.textContent = message;
  status.style.color = message ? '#4ecca3' : '#888';
}

function syncCurrentStateInput(message = '') {
  const input = document.getElementById('currentStateInput');
  if (!input) return;
  input.value = cubeState.join('');
  if (message) {
    const status = document.getElementById('stateInputStatus');
    status.textContent = message;
    status.style.color = '#4ecca3';
  }
}

function normalizeStateInput(value) {
  return value.toUpperCase().replace(/[^URFDLB]/g, '');
}

function getStateInputFormatError(stateStr) {
  if (stateStr.length !== 54) {
    return `需要54个字符，当前${stateStr.length}个`;
  }

  const counts = {};
  for (const c of stateStr) {
    counts[c] = (counts[c] || 0) + 1;
  }

  for (const face of FACE_NAMES) {
    if ((counts[face] || 0) !== 9) {
      return `${FACE_LABELS[face]}色应为9块，当前${counts[face] || 0}块`;
    }
  }

  return '';
}

function applyStateInput() {
  const input = document.getElementById('stateInput');
  const status = document.getElementById('stateInputStatus');
  const stateStr = normalizeStateInput(input.value);
  const formatError = getStateInputFormatError(stateStr);

  input.value = stateStr;

  if (formatError) {
    status.textContent = formatError;
    status.style.color = '#e94560';
    return;
  }

  const beforeState = [...cubeState];
  clearPreview();
  cubeState = stateStr.split('');
  initialCubeState = [...cubeState];
  recordHistory(beforeState, cubeState, { label: '应用状态串', kind: 'state' });
  clearSolution();
  update2DView();
  update3DCube();

  const result = checkValidity();
  syncStateInput();
  syncCurrentStateInput();
  status.textContent = result.valid ? '已应用' : '已应用，状态暂不合法';
  status.style.color = result.valid ? '#4ecca3' : '#f0c674';
}

function setCurrentAsInitial() {
  clearPreview();
  initialCubeState = [...cubeState];
  clearSolution();
  syncStateInput('已设当前为初始');
  syncCurrentStateInput();
  checkValidity();
}

function restoreInitialState() {
  stopPlay();
  const beforeState = [...cubeState];
  clearPreview();
  cubeState = [...initialCubeState];
  recordHistory(beforeState, cubeState, { label: '回到初始', kind: 'state' });
  clearSolution();
  update2DView();
  update3DCube();
  syncStateInput('已回到初始');
  syncCurrentStateInput();
  checkValidity();
}

function animate3D() {
  requestAnimationFrame(animate3D);
  if (controls) controls.update();
  renderer.render(scene, camera);
}

// ============================================================
// Simple Orbit Controls
// ============================================================
function initOrbitControls(container) {
  let isDragging = false;
  let dragMoved = false;
  let previousMousePosition = { x: 0, y: 0 };
  let spherical = { theta: Math.PI / 4, phi: Math.PI / 4, radius: 8 };

  function updateCamera() {
    camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
    camera.position.y = spherical.radius * Math.cos(spherical.phi);
    camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
    camera.lookAt(0, 0, 0);
  }

  controls = {
    update: () => {},
    wasDrag: () => mouseMode === 'mark' && dragMoved,
    beginOrbitDrag: (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragMoved = false;
      previousMousePosition = { x: e.clientX, y: e.clientY };
    },
    moveOrbitDrag: (e) => {
      if (!isDragging) return;
      const dx = e.clientX - previousMousePosition.x;
      const dy = e.clientY - previousMousePosition.y;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
      spherical.theta -= dx * 0.01;
      spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.01));
      previousMousePosition = { x: e.clientX, y: e.clientY };
      updateCamera();
    },
    endOrbitDrag: () => {
      isDragging = false;
    }
  };

  container.addEventListener('mousedown', (e) => {
    if (mouseMode !== 'mark') return;
    if (e.button === 0) controls.beginOrbitDrag(e);
  });

  container.addEventListener('mousemove', (e) => {
    if (mouseMode !== 'mark' || !isDragging) return;
    controls.moveOrbitDrag(e);
  });

  container.addEventListener('mouseup', () => { isDragging = false; });
  container.addEventListener('mouseleave', () => { isDragging = false; });

  container.addEventListener('wheel', (e) => {
    if (mouseMode !== 'mark') return;
    e.preventDefault();
    spherical.radius = Math.max(4, Math.min(15, spherical.radius + e.deltaY * 0.01));
    updateCamera();
  }, { passive: false });

  updateCamera();
}

// ============================================================
// Validation
// ============================================================
function checkValidity(context = 'edit') {
  const statusEl = document.getElementById('validityStatus');
  const btnSolve = document.getElementById('btnSolve');
  const result = validateCube();
  const mode = document.getElementById('solverMode')?.value || 'lbl';
  const ready = solverReady && (mode !== 'twoPhase' || twoPhaseReady);

  if (result.valid) {
    statusEl.textContent = '✓ 有效';
    statusEl.style.background = '#1a3a2a';
    statusEl.style.color = '#4ecca3';
    btnSolve.disabled = !ready;
  } else {
    const isSolveAttempt = context === 'solve';
    statusEl.textContent = (isSolveAttempt ? '✗ ' : '⚠ 标记中：') + result.reason;
    statusEl.style.background = isSolveAttempt ? '#3a1a1a' : '#3a2f1a';
    statusEl.style.color = isSolveAttempt ? '#e94560' : '#f0c674';
    btnSolve.disabled = true;
  }

  return result;
}

function validateCube() {
  const counts = {};
  for (const c of cubeState) {
    counts[c] = (counts[c] || 0) + 1;
  }

  // 1. Each color must appear exactly 9 times
  for (const face of FACE_NAMES) {
    if ((counts[face] || 0) !== 9) {
      const label = FACE_LABELS[face];
      const actual = counts[face] || 0;
      return { valid: false, reason: `${label}色应为9块，当前${actual}块` };
    }
  }

  // 2. Center pieces must be correct
  for (let i = 0; i < 6; i++) {
    const centerIdx = i * 9 + 4;
    if (cubeState[centerIdx] !== FACE_NAMES[i]) {
      return { valid: false, reason: `中心块颜色不匹配` };
    }
  }

  const cube = parseCubePieces(cubeState);
  if (!cube.valid) {
    return cube;
  }

  if (cube.cornerOrientation % 3 !== 0) {
    return { valid: false, reason: '角块方向不合法' };
  }

  if (cube.edgeOrientation % 2 !== 0) {
    return { valid: false, reason: '棱块方向不合法' };
  }

  if (getPermutationParity(cube.corners) !== getPermutationParity(cube.edges)) {
    return { valid: false, reason: '角块和棱块奇偶性不一致' };
  }

  return { valid: true };
}

function parseCubePieces(state) {
  const corners = [];
  let cornerOrientation = 0;
  const seenCorners = new Set();

  for (let i = 0; i < CORNER_FACELETS.length; i++) {
    const colors = CORNER_FACELETS[i].map(idx => state[idx]);
    const orientation = colors.findIndex(color => color === 'U' || color === 'D');

    if (orientation === -1) {
      return { valid: false, reason: `第${i + 1}个角块缺少上下色` };
    }

    const col1 = colors[(orientation + 1) % 3];
    const col2 = colors[(orientation + 2) % 3];
    const piece = CORNER_COLORS.findIndex(pieceColors =>
      colors[orientation] === pieceColors[0] &&
      col1 === pieceColors[1] &&
      col2 === pieceColors[2]
    );

    if (piece === -1) {
      return { valid: false, reason: `第${i + 1}个角块贴纸顺序不合法` };
    }
    if (seenCorners.has(piece)) {
      return { valid: false, reason: '角块重复或缺失' };
    }

    seenCorners.add(piece);
    corners.push(piece);
    cornerOrientation += orientation;
  }

  const edges = [];
  let edgeOrientation = 0;
  const seenEdges = new Set();

  for (let i = 0; i < EDGE_FACELETS.length; i++) {
    const colors = EDGE_FACELETS[i].map(idx => state[idx]);
    let piece = -1;
    let orientation = 0;

    for (let j = 0; j < EDGE_COLORS.length; j++) {
      if (colors[0] === EDGE_COLORS[j][0] && colors[1] === EDGE_COLORS[j][1]) {
        piece = j;
        orientation = 0;
        break;
      }
      if (colors[0] === EDGE_COLORS[j][1] && colors[1] === EDGE_COLORS[j][0]) {
        piece = j;
        orientation = 1;
        break;
      }
    }

    if (piece === -1) {
      return { valid: false, reason: `第${i + 1}个棱块颜色组合不合法` };
    }
    if (seenEdges.has(piece)) {
      return { valid: false, reason: '棱块重复或缺失' };
    }

    seenEdges.add(piece);
    edges.push(piece);
    edgeOrientation += orientation;
  }

  return {
    valid: true,
    corners,
    edges,
    cornerOrientation,
    edgeOrientation
  };
}

function getPermutationParity(items) {
  let parity = 0;
  for (let i = 0; i < items.length - 1; i++) {
    for (let j = i + 1; j < items.length; j++) {
      if (items[i] > items[j]) parity++;
    }
  }
  return parity % 2;
}

// ============================================================
// Solver
// ============================================================
function solveCube() {
  if (!solverReady) {
    alert('求解器尚未初始化完成，请稍候');
    return;
  }

  // Final validation
  const result = checkValidity('solve');
  if (!result.valid) {
    setSolutionMessage('魔方状态不合法: ' + result.reason);
    return;
  }

  // Build facelet string
  const stateStr = cubeState.join('');

  // Check if already solved
  if (stateStr === SOLVED_STATE) {
    setSolutionMessage('魔方已经是还原状态!');
    document.getElementById('solutionCount').textContent = '0 步';
    solution = [];
    solutionSteps = [];
    return;
  }

  setSolutionMessage('求解中...');
  document.getElementById('solutionCount').textContent = '';

  setTimeout(() => {
    try {
      const mode = document.getElementById('solverMode').value;
      let moves;

      if (mode === 'twoPhase') {
        if (!twoPhaseReady) {
          setSolutionMessage('两阶段求解器仍在初始化，请稍候或选择固定公式 LBL');
          return;
        }
        const cube = Cube.fromString(stateStr);
        const sol = cube.solve();
        moves = sol.split(' ').filter(s => s);
      } else {
        moves = solveLBLStrict(stateStr);
      }

      if (!moves || moves.length === 0) {
        setSolutionMessage('魔方已经是还原状态!');
        document.getElementById('solutionCount').textContent = '0 步';
        solution = [];
        solutionSteps = [];
        return;
      }

      solution = trimSolutionAtSolvedState(stateStr, moves);
      solutionSteps = parseSolution(solution);

      if (solution.length === 0) {
        setSolutionMessage('魔方已经是还原状态!');
        document.getElementById('solutionCount').textContent = '0 步';
        solutionSteps = [];
        return;
      }

      // Save pre-solve state for step playback
      window._preSolveState = [...cubeState];

      renderSolutionText(-1);
      document.getElementById('solutionCount').textContent = solution.length + ' 步';
      document.getElementById('btnPlay').disabled = false;
      document.getElementById('btnStepNext').disabled = false;
      document.getElementById('btnStepPrev').disabled = true;
      currentStep = -1;
      document.getElementById('stepIndicator').textContent = '';

    } catch (e) {
      setSolutionMessage('求解失败: ' + e.message);
      console.error(e);
    }
  }, 50);
}

function setSolutionMessage(message) {
  const el = document.getElementById('solutionText');
  el.classList.remove('has-moves');
  el.textContent = message;
}

function renderSolutionText(activeIndex = -1) {
  const el = document.getElementById('solutionText');
  el.textContent = '';

  if (solution.length === 0) {
    el.classList.remove('has-moves');
    el.textContent = '标记魔方颜色后点击"求解"';
    return;
  }

  el.classList.add('has-moves');
  let activeEl = null;
  solution.forEach((move, index) => {
    const span = document.createElement('span');
    span.className = 'solution-move';
    if (index < activeIndex) span.classList.add('done');
    if (index === activeIndex) {
      span.classList.add('active');
      activeEl = span;
    }
    span.textContent = move;
    el.appendChild(span);
  });

  if (activeEl) {
    const revealActiveMove = () => activeEl.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(revealActiveMove);
    } else {
      setTimeout(revealActiveMove, 0);
    }
  }
}

function updateStepIndicator(activeIndex) {
  const el = document.getElementById('stepIndicator');
  el.textContent = activeIndex >= 0 && activeIndex < solution.length
    ? `步骤 ${activeIndex + 1} / ${solutionSteps.length}: ${solution[activeIndex]}`
    : '';
}

function parseSolution(moves) {
  return moves.map(move => {
    const face = move[0];
    let times = 1;
    if (move.includes('2')) times = 2;
    if (move.includes("'")) times = 3;
    return { face, times };
  });
}

function solveLBLStrict(initialState) {
  const state = createLBLState(initialState);
  const rawMoves = [];

  function pushPhase(fn) {
    if (state.isSolved()) return;
    const part = fn();
    if (part) rawMoves.push(part);
  }

  pushPhase(state.firstLayerEdges);
  pushPhase(state.firstLayerCorners);
  pushPhase(state.secondLayer);
  pushPhase(state.topCross);
  pushPhase(state.thirdLayerCornersPosition);
  pushPhase(state.thirdLayerCornersOrientation);
  pushPhase(state.thirdLayerEdges);

  return convertLBLRawMoves(rawMoves.join(''), initialState);
}

function createLBLState(initialState) {
  // Fixed-formula beginner LBL adapted from
  // https://github.com/zaidmukaddam/rubiks-cube-solver/blob/master/cube/js/lbl.js
  const cube = Cube.fromString(initialState);
  const cubeState = getLBLStateFromString(initialState);
  const nextFace = { l: 'f', f: 'r', r: 'b', b: 'l' };
  const prevFace = { l: 'b', b: 'r', r: 'f', f: 'l' };
  const nextColor = {};
  nextColor[cubeState.l] = cubeState.f;
  nextColor[cubeState.f] = cubeState.r;
  nextColor[cubeState.r] = cubeState.b;
  nextColor[cubeState.b] = cubeState.l;

  function isSolved() {
    return cube.asString() === SOLVED_STATE;
  }

  function moveRaw(order) {
    for (const move of order) {
      const cubeMove = lblRawMoveToCubeMove(move);
      if (cubeMove) cube.move(cubeMove);
      changeState(move);
    }
  }

  function twistB() {
    let tmp = cubeState.ub;
    cubeState.ub = cubeState.rb;
    cubeState.rb = cubeState.db;
    cubeState.db = cubeState.bl[1] + cubeState.bl[0];
    cubeState.bl = tmp[1] + tmp[0];

    tmp = cubeState.ubl;
    cubeState.ubl = cubeState.urb[1] + cubeState.urb[2] + cubeState.urb[0];
    cubeState.urb = cubeState.drb[1] + cubeState.drb[0] + cubeState.drb[2];
    cubeState.drb = cubeState.dbl[2] + cubeState.dbl[0] + cubeState.dbl[1];
    cubeState.dbl = tmp[2] + tmp[1] + tmp[0];
  }

  function twistR() {
    let tmp = cubeState.ur;
    cubeState.ur = cubeState.fr;
    cubeState.fr = cubeState.dr;
    cubeState.dr = cubeState.rb[1] + cubeState.rb[0];
    cubeState.rb = tmp[1] + tmp[0];

    tmp = cubeState.urb;
    cubeState.urb = cubeState.ufr[1] + cubeState.ufr[2] + cubeState.ufr[0];
    cubeState.ufr = cubeState.dfr[1] + cubeState.dfr[0] + cubeState.dfr[2];
    cubeState.dfr = cubeState.drb[2] + cubeState.drb[0] + cubeState.drb[1];
    cubeState.drb = tmp[2] + tmp[1] + tmp[0];
  }

  function twistF() {
    let tmp = cubeState.uf;
    cubeState.uf = cubeState.lf;
    cubeState.lf = cubeState.df;
    cubeState.df = cubeState.fr[1] + cubeState.fr[0];
    cubeState.fr = tmp[1] + tmp[0];

    tmp = cubeState.ufr;
    cubeState.ufr = cubeState.ulf[1] + cubeState.ulf[2] + cubeState.ulf[0];
    cubeState.ulf = cubeState.dlf[1] + cubeState.dlf[0] + cubeState.dlf[2];
    cubeState.dlf = cubeState.dfr[2] + cubeState.dfr[0] + cubeState.dfr[1];
    cubeState.dfr = tmp[2] + tmp[1] + tmp[0];
  }

  function twistL() {
    let tmp = cubeState.ul;
    cubeState.ul = cubeState.bl;
    cubeState.bl = cubeState.dl;
    cubeState.dl = cubeState.lf[1] + cubeState.lf[0];
    cubeState.lf = tmp[1] + tmp[0];

    tmp = cubeState.ulf;
    cubeState.ulf = cubeState.ubl[1] + cubeState.ubl[2] + cubeState.ubl[0];
    cubeState.ubl = cubeState.dbl[1] + cubeState.dbl[0] + cubeState.dbl[2];
    cubeState.dbl = cubeState.dlf[2] + cubeState.dlf[0] + cubeState.dlf[1];
    cubeState.dlf = tmp[2] + tmp[1] + tmp[0];
  }

  function twistU() {
    let tmp = cubeState.ul;
    cubeState.ul = cubeState.uf;
    cubeState.uf = cubeState.ur;
    cubeState.ur = cubeState.ub;
    cubeState.ub = tmp;

    tmp = cubeState.ulf;
    cubeState.ulf = cubeState.ufr;
    cubeState.ufr = cubeState.urb;
    cubeState.urb = cubeState.ubl;
    cubeState.ubl = tmp;
  }

  function twistD() {
    let tmp = cubeState.dl;
    cubeState.dl = cubeState.db;
    cubeState.db = cubeState.dr;
    cubeState.dr = cubeState.df;
    cubeState.df = tmp;

    tmp = cubeState.dlf;
    cubeState.dlf = cubeState.dbl;
    cubeState.dbl = cubeState.drb;
    cubeState.drb = cubeState.dfr;
    cubeState.dfr = tmp;
  }

  function twistY() {
    twistU();

    let tmp = cubeState.lf;
    cubeState.lf = cubeState.fr;
    cubeState.fr = cubeState.rb;
    cubeState.rb = cubeState.bl;
    cubeState.bl = tmp;

    tmp = cubeState.f;
    cubeState.f = cubeState.r;
    cubeState.r = cubeState.b;
    cubeState.b = cubeState.l;
    cubeState.l = tmp;

    twistD();
    twistD();
    twistD();
  }

  function changeState(order) {
    switch (order) {
      case 'D': twistD(); break;
      case 'd': twistD(); twistD(); twistD(); break;
      case 'U': twistU(); break;
      case 'u': twistU(); twistU(); twistU(); break;
      case 'L': twistL(); break;
      case 'l': twistL(); twistL(); twistL(); break;
      case 'F': twistF(); break;
      case 'f': twistF(); twistF(); twistF(); break;
      case 'R': twistR(); break;
      case 'r': twistR(); twistR(); twistR(); break;
      case 'B': twistB(); break;
      case 'b': twistB(); twistB(); twistB(); break;
      case 'Y': twistY(); break;
      case 'y': twistY(); twistY(); twistY(); break;
    }
  }

  function getBlockPos(block) {
    const reg = new RegExp('[' + block + ']{' + block.length + '}');
    for (const key in cubeState) {
      if (cubeState[key].match(reg)) return { key, value: cubeState[key] };
    }
    throw new Error('找不到块: ' + block);
  }

  function firstLayerEdgesSingle(blockPos, blockColor) {
    let exp = '';
    let expLog = '';

    for (let i = 0; i < 7; i++) {
      const s = getBlockPos(blockColor);

      if (s.key.indexOf('d') !== -1) {
        if (s.value[0] === blockColor[0]) {
          if (s.key === blockPos) return expLog;
          exp = s.key[1].toUpperCase() + s.key[1].toUpperCase();
        } else {
          exp = s.key[1].toUpperCase();
        }
      } else if (s.key.indexOf('u') !== -1) {
        if (s.key[1] === blockPos[1]) {
          if (s.value[0] === blockColor[0]) {
            exp = s.key[1].toUpperCase() + s.key[1].toUpperCase();
          } else if (cubeState[blockPos[0] + nextFace[s.key[1]]] !== cubeState[blockPos[0]] + cubeState[nextFace[s.key[1]]]) {
            exp = 'u' + nextFace[s.key[1]] + s.key[1].toUpperCase();
          } else {
            exp = 'u' + nextFace[s.key[1]] + s.key[1].toUpperCase() + nextFace[s.key[1]].toUpperCase();
          }
        } else {
          exp = 'U';
        }
      } else if (s.value[0] === blockColor[0]) {
        if (s.key[1] === blockPos[1]) {
          exp = s.key[1];
        } else if (cubeState[blockPos[0] + s.key[1]] !== cubeState[blockPos[0]] + cubeState[s.key[1]]) {
          exp = s.key[1].toUpperCase();
        } else {
          exp = s.key[1].toUpperCase() + 'U' + s.key[1];
        }
      } else if (s.key[0] === blockPos[1]) {
        exp = s.key[0].toUpperCase();
      } else if (cubeState[blockPos[0] + s.key[0]] !== cubeState[blockPos[0]] + cubeState[s.key[0]]) {
        exp = s.key[0];
      } else {
        exp = s.key[0] + 'U' + s.key[0].toUpperCase();
      }

      expLog += exp;
      moveRaw(exp);
    }

    throw new Error('底层棱公式未收敛');
  }

  function firstLayerCornersSingle(blockPos, blockColor) {
    let exp = '';
    let expLog = '';

    for (let i = 0; i < 10; i++) {
      const s = getBlockPos(blockColor);

      if (s.key.indexOf('d') !== -1) {
        if (s.value[0] === cubeState.d) {
          if (s.key === blockPos) return expLog;
          exp = s.key[1] + 'U' + s.key[1].toUpperCase();
        } else if (s.value[1] === cubeState.d) {
          exp = s.key[1] + 'u' + s.key[1].toUpperCase();
        } else {
          exp = s.key[2].toUpperCase() + 'U' + s.key[2];
        }
      } else if (s.key === 'u' + blockPos[1] + blockPos[2]) {
        if (s.value[0] === cubeState.d) {
          exp = s.key[2].toUpperCase() + 'u' + s.key[2];
        } else if (s.value[1] === cubeState.d) {
          exp = s.key[1] + 'u' + s.key[1].toUpperCase();
        } else {
          exp = s.key[2].toUpperCase() + 'U' + s.key[2];
        }
      } else {
        exp = 'U';
      }

      expLog += exp;
      moveRaw(exp);
    }

    throw new Error('底层角公式未收敛');
  }

  function secondLayerSingle(blockPos, blockColor) {
    let exp = '';
    let expLog = '';

    for (let i = 0; i < 6; i++) {
      const s = getBlockPos(blockColor);

      if (s.key.indexOf('u') !== -1) {
        if (nextColor[s.value[0]] === s.value[1]) {
          if (s.value[1] === cubeState[s.key[1]]) {
            exp = 'u' + prevFace[s.key[1]] + 'U' + prevFace[s.key[1]].toUpperCase()
              + 'U' + s.key[1].toUpperCase() + 'u' + s.key[1];
          } else {
            exp = 'U';
          }
        } else if (s.value[1] === cubeState[s.key[1]]) {
          exp = 'U' + nextFace[s.key[1]].toUpperCase() + 'u' + nextFace[s.key[1]]
            + 'u' + s.key[1] + 'U' + s.key[1].toUpperCase();
        } else {
          exp = 'U';
        }
      } else if (s.value[0] === cubeState[s.key[0]] && s.value[1] === cubeState[s.key[1]]) {
        return expLog;
      } else {
        exp = 'u' + s.key[0] + 'U' + s.key[0].toUpperCase()
          + 'U' + s.key[1].toUpperCase() + 'u' + s.key[1];
      }

      expLog += exp;
      moveRaw(exp);
    }

    throw new Error('中层棱公式未收敛');
  }

  function firstLayerEdges() {
    let order = '';
    order += firstLayerEdgesSingle('dl', cubeState.d + cubeState.l);
    order += firstLayerEdgesSingle('df', cubeState.d + cubeState.f);
    order += firstLayerEdgesSingle('dr', cubeState.d + cubeState.r);
    order += firstLayerEdgesSingle('db', cubeState.d + cubeState.b);
    return compressLBLRawMoves(order);
  }

  function firstLayerCorners() {
    let order = '';
    order += firstLayerCornersSingle('dlf', cubeState.d + cubeState.l + cubeState.f);
    order += firstLayerCornersSingle('dfr', cubeState.d + cubeState.f + cubeState.r);
    order += firstLayerCornersSingle('drb', cubeState.d + cubeState.r + cubeState.b);
    order += firstLayerCornersSingle('dbl', cubeState.d + cubeState.b + cubeState.l);
    return compressLBLRawMoves(order);
  }

  function secondLayer() {
    let order = '';
    order += secondLayerSingle('lf', cubeState.l + cubeState.f);
    order += secondLayerSingle('fr', cubeState.f + cubeState.r);
    order += secondLayerSingle('rb', cubeState.r + cubeState.b);
    order += secondLayerSingle('bl', cubeState.b + cubeState.l);
    return compressLBLRawMoves(order);
  }

  function topCross() {
    let exp = '';
    let expLog = '';
    const uc = cubeState.u;

    for (let i = 0; i < 4; i++) {
      if (cubeState.ul[0] === uc && cubeState.ur[0] === uc
        && cubeState.uf[0] === uc && cubeState.ub[0] === uc) {
        return compressLBLRawMoves(expLog);
      } else if (cubeState.ul[0] === uc && cubeState.ur[0] === uc) {
        exp = 'FRUruf';
      } else if (cubeState.uf[0] === uc && cubeState.ub[0] === uc) {
        exp = 'RBUbur';
      } else if (cubeState.uf[0] === uc && cubeState.ur[0] === uc) {
        exp = 'FRUruf';
      } else if (cubeState.ur[0] === uc && cubeState.ub[0] === uc) {
        exp = 'RBUbur';
      } else if (cubeState.ub[0] === uc && cubeState.ul[0] === uc) {
        exp = 'BLUlub';
      } else if (cubeState.ul[0] === uc && cubeState.uf[0] === uc) {
        exp = 'LFUful';
      } else {
        exp = 'FRUruf';
      }

      expLog += exp;
      moveRaw(exp);
    }

    throw new Error('顶层十字公式未收敛');
  }

  function thirdLayerCornersPosition() {
    const step = 'rLUluRULul';
    const blocks = ['ulf', 'ufr', 'urb', 'ubl'];
    const uc = cubeState.u;
    let expLog = '';

    for (let i = 0; i < 4; i++) {
      let last = i;
      let times = 0;

      for (let j = i + 1; j < i + 4; j++) {
        const next = j % 4;
        const lastc = cubeState[blocks[last]].replace(uc, '');
        const nextc = cubeState[blocks[next]].replace(uc, '');

        if (nextColor[lastc[0]] === lastc[1]) {
          if (nextc.indexOf(lastc[1]) !== -1 && nextc.indexOf(nextColor[lastc[1]]) !== -1) {
            times += 1;
          } else {
            break;
          }
        } else if (nextc.indexOf(lastc[0]) !== -1 && nextc.indexOf(nextColor[lastc[0]]) !== -1) {
          times += 1;
        } else {
          break;
        }

        last = next;
      }

      if (times === 1) {
        last = (last - 1 + 4) % 4;
        if (last === 0) expLog = 'u' + step;
        else if (last === 1) expLog = step;
        else if (last === 2) expLog = 'U' + step;
        else if (last === 3) expLog = 'UU' + step;
        moveRaw(expLog);
        return compressLBLRawMoves(expLog);
      } else if (times > 1) {
        return compressLBLRawMoves(expLog);
      }
    }

    expLog = step + 'U' + step;
    moveRaw(expLog);
    return compressLBLRawMoves(expLog);
  }

  function thirdLayerCornersOrientation() {
    const step1 = 'ruRuruuRuu';
    const step2 = 'FUfUFUUfUU';
    const blocks = ['ulf', 'ufr', 'urb', 'ubl'];
    const uc = cubeState.u;
    let expLog = '';
    let pattern = '';

    for (const block of blocks) {
      pattern += cubeState[block].indexOf(uc);
    }

    if (pattern === '0000') return '';
    if (pattern.match(/2220|0222|2022|2202/)) {
      if (pattern === '0222') expLog += 'U';
      else if (pattern === '2022') expLog += 'UU';
      else if (pattern === '2202') expLog += 'u';
      expLog += step1;
    } else if (pattern.match(/1110|0111|1011|1101/)) {
      if (pattern === '0111') expLog += 'U';
      else if (pattern === '1011') expLog += 'UU';
      else if (pattern === '1101') expLog += 'u';
      expLog += step2;
    } else if (pattern.match(/2001|1200|0120|0012/)) {
      if (pattern === '1200') expLog += 'U';
      else if (pattern === '0120') expLog += 'UU';
      else if (pattern === '0012') expLog += 'u';
      expLog += step1 + 'U' + step2;
    } else if (pattern.match(/1002|2100|0210|0021/)) {
      if (pattern === '2100') expLog += 'U';
      else if (pattern === '0210') expLog += 'UU';
      else if (pattern === '0021') expLog += 'u';
      expLog += step2 + 'U' + step1;
    } else if (pattern.match(/2121|1212/)) {
      if (pattern === '1212') expLog += 'U';
      expLog += step2 + 'UU' + step2;
    } else if (pattern.match(/2112|2211|1221|1122/)) {
      if (pattern === '2211') expLog += 'U';
      else if (pattern === '1221') expLog += 'UU';
      else if (pattern === '1122') expLog += 'u';
      expLog += step1 + 'U' + step1;
    } else if (pattern.match(/0201|1020/)) {
      if (pattern === '1020') expLog += 'U';
      expLog += step1 + 'UU' + step2;
    } else if (pattern.match(/0102|2010/)) {
      if (pattern === '2010') expLog += 'U';
      expLog += step2 + 'UU' + step1;
    } else {
      throw new Error('顶角方向模式不支持: ' + pattern);
    }

    moveRaw(expLog);
    return compressLBLRawMoves(expLog);
  }

  function thirdLayerEdges() {
    const step1 = 'ruRuruuRuu';
    const step2 = 'FUfUFUUfUU';
    let expLog = '';

    while (cubeState.ulf[2] !== cubeState.f) {
      moveRaw('U');
      expLog += 'U';
    }

    for (let i = 0; i < 3; i++) {
      let exp = '';
      const s = cubeState.uf[1] + cubeState.ur[1] + cubeState.ub[1] + cubeState.ul[1];
      const c = cubeState.f + cubeState.r + cubeState.b + cubeState.l;

      let times = 0;
      let pos = -1;
      for (let j = 0; j < 4; j++) {
        if (s[j] === c[j]) {
          times++;
          pos = j;
        }
      }

      if (times > 1) {
        return compressLBLRawMoves(expLog);
      } else if (times === 1) {
        if (pos === 1) exp += 'Y';
        else if (pos === 2) exp += 'YY';
        else if (pos === 3) exp += 'y';

        if (s[(pos + 1) % 4] === nextColor[nextColor[s[pos]]]) {
          exp += step1 + step2;
        } else {
          exp += 'y' + step2 + step1;
        }
      } else {
        exp += step1 + step2;
      }

      expLog += exp;
      moveRaw(exp);
    }

    throw new Error('顶层棱公式未收敛');
  }

  return {
    isSolved,
    firstLayerEdges,
    firstLayerCorners,
    secondLayer,
    topCross,
    thirdLayerCornersPosition,
    thirdLayerCornersOrientation,
    thirdLayerEdges
  };
}

function getLBLStateFromString(state) {
  return {
    d: state[31],
    u: state[4],
    l: state[40],
    r: state[13],
    f: state[22],
    b: state[49],
    dl: state[30] + state[43],
    df: state[28] + state[25],
    dr: state[32] + state[16],
    db: state[34] + state[52],
    ul: state[3] + state[37],
    uf: state[7] + state[19],
    ur: state[5] + state[10],
    ub: state[1] + state[46],
    lf: state[41] + state[21],
    fr: state[23] + state[12],
    rb: state[14] + state[48],
    bl: state[50] + state[39],
    dlf: state[27] + state[44] + state[24],
    dfr: state[29] + state[26] + state[15],
    drb: state[35] + state[17] + state[51],
    dbl: state[33] + state[53] + state[42],
    ulf: state[6] + state[38] + state[18],
    ufr: state[8] + state[20] + state[9],
    ubl: state[0] + state[47] + state[36],
    urb: state[2] + state[11] + state[45]
  };
}

function lblRawMoveToCubeMove(move) {
  if (!move) return '';
  const face = move.toUpperCase();
  if (face === 'Y') return move === 'Y' ? 'y' : "y'";
  return move === face ? face : face + "'";
}

function convertLBLRawMoves(raw, initialState) {
  const moves = [];
  const viewFaceMaps = [
    { F: 'F', R: 'R', B: 'B', L: 'L' },
    { F: 'R', R: 'B', B: 'L', L: 'F' },
    { F: 'B', R: 'L', B: 'F', L: 'R' },
    { F: 'L', R: 'F', B: 'R', L: 'B' }
  ];
  let view = 0;

  for (const rawMove of raw) {
    const face = rawMove.toUpperCase();
    if (face === 'Y') {
      view = (view + (rawMove === 'Y' ? 1 : 3)) % 4;
      continue;
    }

    const mappedFace = 'FRBL'.includes(face) ? viewFaceMaps[view][face] : face;
    moves.push(mappedFace + (rawMove === face ? '' : "'"));
  }

  return normalizeMoveList(moves);
}

function normalizeMoveList(moves) {
  const result = [];
  const powerOf = move => move.includes('2') ? 2 : move.includes("'") ? 3 : 1;
  const formatMove = (face, power) => {
    if (power === 1) return face;
    if (power === 2) return face + '2';
    if (power === 3) return face + "'";
    return '';
  };

  for (const move of moves) {
    const last = result[result.length - 1];
    if (last && last[0] === move[0]) {
      const power = (powerOf(last) + powerOf(move)) % 4;
      result.pop();
      if (power) result.push(formatMove(move[0], power));
    } else {
      result.push(move);
    }
  }

  return result;
}

function compressLBLRawMoves(order) {
  for (let i = 0; i < 10; i++) {
    order = order.replace(/uU|Uu|dD|Dd|lL|Ll|fF|Ff|rR|Rr|bB|Bb|yY|Yy|uuuu|dddd|llll|ffff|rrrr|bbbb|yyyy|UUUU|DDDD|LLLL|FFFF|RRRR|BBBB|YYYY/g, '');
    order = order.replace(/uuu/g, 'U');
    order = order.replace(/ddd/g, 'D');
    order = order.replace(/lll/g, 'L');
    order = order.replace(/fff/g, 'F');
    order = order.replace(/rrr/g, 'R');
    order = order.replace(/bbb/g, 'B');
    order = order.replace(/yyy/g, 'Y');
    order = order.replace(/UUU/g, 'u');
    order = order.replace(/DDD/g, 'd');
    order = order.replace(/LLL/g, 'l');
    order = order.replace(/FFF/g, 'f');
    order = order.replace(/RRR/g, 'r');
    order = order.replace(/BBB/g, 'b');
    order = order.replace(/YYY/g, 'y');
  }
  return order;
}

function trimSolutionAtSolvedState(initialState, moves) {
  const cube = Cube.fromString(initialState);
  const trimmed = [];

  for (const move of moves) {
    cube.move(move);
    trimmed.push(move);

    if (cube.asString() === SOLVED_STATE) {
      return trimmed;
    }
  }

  return trimmed;
}

function clearSolution() {
  stopPlay();
  solution = [];
  solutionSteps = [];
  currentStep = -1;
  window._preSolveState = null;

  renderSolutionText(-1);
  document.getElementById('solutionCount').textContent = '';
  document.getElementById('stepIndicator').textContent = '';
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('btnPlay').textContent = '▶ 播放动画';
  document.getElementById('btnStepPrev').disabled = true;
  document.getElementById('btnStepNext').disabled = true;
}

// ============================================================
// Animation / Step Playback
// ============================================================
function togglePlay() {
  if (isPlaying) {
    stopPlay();
  } else {
    startPlay();
  }
}

function startPlay() {
  if (solution.length === 0 || isAnimating3D) return;
  isPlaying = true;
  document.getElementById('btnPlay').textContent = '⏸ 暂停';
  playNextStep();
}

function stopPlay() {
  isPlaying = false;
  document.getElementById('btnPlay').textContent = '▶ 播放动画';
  if (playTimer) clearTimeout(playTimer);
  playTimer = null;
}

function playNextStep() {
  if (!isPlaying || currentStep >= solutionSteps.length - 1) {
    stopPlay();
    return;
  }

  stepTo(currentStep + 1, { keepPlaying: true }).then(() => {
    if (!isPlaying) return;
    playTimer = setTimeout(playNextStep, 180);
  });
}

async function stepTo(step, options = {}) {
  if (step < -1 || step >= solutionSteps.length) return;
  if (!window._preSolveState || isAnimating3D) return;
  if (!options.keepPlaying) stopPlay();

  const isForwardStep = step === currentStep + 1 && step >= 0;
  const isBackwardStep = step === currentStep - 1 && currentStep >= 0;
  const shouldAnimate = isForwardStep || isBackwardStep;
  const move = isForwardStep ? solutionSteps[step] : isBackwardStep ? solutionSteps[currentStep] : null;
  const activeStep = isForwardStep ? step : isBackwardStep ? currentStep : step;
  setPlaybackControlsDisabled(true);
  renderSolutionText(activeStep);
  updateStepIndicator(activeStep);

  if (move) {
    await animateTurn3D(move, isBackwardStep);
  }

  applyPlaybackState(step, { preserve3D: shouldAnimate });
  setPlaybackControlsDisabled(false);
}

function applyPlaybackState(step, options = {}) {
  const preserve3D = !!options.preserve3D;
  const baseState = window._preSolveState.join('');
  const tempCube = Cube.fromString(baseState);

  // Apply moves up to step
  for (let i = 0; i <= step; i++) {
    const { face, times } = solutionSteps[i];
    const moveStr = face + (times === 2 ? '2' : times === 3 ? "'" : '');
    tempCube.move(moveStr);
  }

  // Update cubeState from tempCube
  const newState = tempCube.asString();
  for (let i = 0; i < 54; i++) {
    cubeState[i] = newState[i];
  }

  currentStep = step;
  update2DView();
  if (!preserve3D) {
    update3DCube();
  }
  syncCurrentStateInput();

  renderSolutionText(step);
  updateStepIndicator(step);

  document.getElementById('btnStepPrev').disabled = step <= -1;
  document.getElementById('btnStepNext').disabled = step >= solutionSteps.length - 1;
}

function setPlaybackControlsDisabled(disabled) {
  document.getElementById('btnStepPrev').disabled = disabled || currentStep <= -1;
  document.getElementById('btnStepNext').disabled = disabled || currentStep >= solutionSteps.length - 1;
}

// ============================================================
// Reset & Undo
// ============================================================
function resetCube() {
  stopPlay();
  clearPreview();
  undoStack = [];
  redoStack = [];
  solution = [];
  solutionSteps = [];
  currentStep = -1;
  window._preSolveState = null;

  for (let i = 0; i < 54; i++) {
    cubeState[i] = FACE_NAMES[Math.floor(i / 9)];
  }
  initialCubeState = [...cubeState];

  update2DView();
  update3DCube();
  syncStateInput();
  syncCurrentStateInput();
  checkValidity();

  renderSolutionText(-1);
  document.getElementById('solutionCount').textContent = '';
  document.getElementById('stepIndicator').textContent = '';
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('btnPlay').textContent = '▶ 播放动画';
  document.getElementById('btnStepPrev').disabled = true;
  document.getElementById('btnStepNext').disabled = true;
  updateHistoryButtons();
}

async function undoAction() {
  if (isAnimating3D) return;
  if (undoStack.length === 0) return;
  stopPlay();
  clearPreview();

  const action = undoStack.pop();
  redoStack.push({
    before: [...action.before],
    after: [...action.after],
    label: action.label,
    kind: action.kind,
    move: action.move
  });

  clearSolution();
  if (action.kind === 'turn' && action.move) {
    const inverseMove = invertMove(action.move);
    setHistoryButtonsDisabled(true);
    await animateHistoryTurn(inverseMove);
  }
  applyHistoryState(action.before, '已撤销');
  updateHistoryButtons();
}

async function redoAction() {
  if (isAnimating3D) return;
  if (redoStack.length === 0) return;
  stopPlay();
  clearPreview();

  const action = redoStack.pop();
  undoStack.push({
    before: [...action.before],
    after: [...action.after],
    label: action.label,
    kind: action.kind,
    move: action.move
  });

  clearSolution();
  if (action.kind === 'turn' && action.move) {
    setHistoryButtonsDisabled(true);
    await animateHistoryTurn(action.move);
  }
  applyHistoryState(action.after, '已重做');
  updateHistoryButtons();
}

function applyHistoryState(state, message) {
  cubeState = [...state];
  initialCubeState = [...cubeState];
  update2DView();
  update3DCube();
  syncStateInput(message);
  syncCurrentStateInput();
  checkValidity();
}

function animateHistoryTurn(move) {
  if (!move) return Promise.resolve();
  if (!/^[URFDLB](2|')?$/.test(move)) return Promise.resolve();
  return animateTurn3D(parseSolution([move])[0]);
}

function invertMove(move) {
  if (move.includes('2')) return move;
  return move.endsWith("'") ? move[0] : move[0] + "'";
}

function updateHistoryButtons() {
  setHistoryButtonsDisabled(false);
}

function setHistoryButtonsDisabled(forceDisabled) {
  const undoBtn = document.getElementById('btnUndo');
  const redoBtn = document.getElementById('btnRedo');
  if (undoBtn) undoBtn.disabled = forceDisabled || undoStack.length === 0;
  if (redoBtn) redoBtn.disabled = forceDisabled || redoStack.length === 0;
}
